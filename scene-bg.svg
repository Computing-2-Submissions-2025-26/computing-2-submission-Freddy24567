<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" preserveAspectRatio="xMidYMid slice">

  <!-- Sky -->
  <rect width="1200" height="420" fill="#4db8ff"/>

  <!-- Sun -->
  <circle cx="980" cy="80" r="48" fill="#ffe333"/>
  <!-- Sun rays -->
  <g stroke="#ffe333" stroke-width="7" stroke-linecap="round">
    <line x1="980" y1="14"  x2="980" y2="2"/>
    <line x1="980" y1="146" x2="980" y2="158"/>
    <line x1="914" y1="80"  x2="902" y2="80"/>
    <line x1="1046" y1="80" x2="1058" y2="80"/>
    <line x1="933" y1="33"  x2="924" y2="24"/>
    <line x1="1027" y1="127" x2="1036" y2="136"/>
    <line x1="1027" y1="33"  x2="1036" y2="24"/>
    <line x1="933"  y1="127" x2="924"  y2="136"/>
  </g>

  <!-- Cloud 1 – large, right side -->
  <g fill="white">
    <circle cx="1100" cy="90"  r="38"/>
    <circle cx="1148" cy="78"  r="30"/>
    <circle cx="1060" cy="85"  r="28"/>
    <circle cx="1130" cy="108" r="26"/>
    <circle cx="1078" cy="108" r="22"/>
  </g>

  <!-- Cloud 2 – smaller, upper left -->
  <g fill="white">
    <circle cx="180" cy="64"  r="30"/>
    <circle cx="220" cy="52"  r="24"/>
    <circle cx="148" cy="60"  r="20"/>
    <circle cx="204" cy="78"  r="20"/>
    <circle cx="164" cy="76"  r="16"/>
  </g>

  <!-- Cloud 3 – medium centre-left -->
  <g fill="white">
    <circle cx="520" cy="50"  r="26"/>
    <circle cx="556" cy="40"  r="20"/>
    <circle cx="492" cy="48"  r="18"/>
    <circle cx="540" cy="62"  r="17"/>
    <circle cx="508" cy="62"  r="14"/>
  </g>

  <!-- Rolling green hill – back (lighter) -->
  <ellipse cx="600" cy="480" rx="780" ry="260" fill="#6ac940"/>

  <!-- Rolling green hill – front (darker) -->
  <ellipse cx="400" cy="500" rx="700" ry="260" fill="#4aac28"/>

  <!-- Extra ground fill -->
  <rect x="0" y="330" width="1200" height="90" fill="#4aac28"/>

  <!-- ── House on the hill ───────────────────────────────────── -->
  <g transform="translate(360,80)">
    <!-- House body -->
    <rect x="0" y="80" width="130" height="120" fill="#f0e888" rx="4"/>
    <!-- Roof -->
    <polygon points="-14,80 65,-10 144,80" fill="#cc5533"/>
    <!-- Roof tiles (horizontal lines) -->
    <line x1="-10" y1="50" x2="140" y2="50" stroke="#b04020" stroke-width="3"/>
    <line x1="-6"  y1="20" x2="136" y2="20" stroke="#b04020" stroke-width="3"/>
    <!-- Door -->
    <rect x="48" y="140" width="34" height="60" fill="#e8c820" rx="3"/>
    <circle cx="79" cy="171" r="3" fill="#c0a010"/>
    <!-- Windows row 1 -->
    <rect x="10" y="100" width="30" height="26" fill="white" rx="3"/>
    <line x1="25" y1="100" x2="25" y2="126" stroke="#ddd" stroke-width="2"/>
    <line x1="10" y1="113" x2="40" y2="113" stroke="#ddd" stroke-width="2"/>
    <rect x="90" y="100" width="30" height="26" fill="white" rx="3"/>
    <line x1="105" y1="100" x2="105" y2="126" stroke="#ddd" stroke-width="2"/>
    <line x1="90"  y1="113" x2="120" y2="113" stroke="#ddd" stroke-width="2"/>
    <!-- Attic window -->
    <ellipse cx="65" cy="42" rx="18" ry="16" fill="white"/>
    <line x1="65" y1="26" x2="65" y2="58" stroke="#ddd" stroke-width="2"/>
    <line x1="47" y1="42" x2="83" y2="42" stroke="#ddd" stroke-width="2"/>
    <!-- Flower boxes -->
    <rect x="7"  y="126" width="36" height="8" fill="#c85520" rx="2"/>
    <circle cx="14" cy="122" r="4" fill="#e83060"/> <circle cx="22" cy="120" r="4" fill="#e83060"/>
    <circle cx="30" cy="122" r="4" fill="#e83060"/> <circle cx="38" cy="121" r="4" fill="#e83060"/>
    <rect x="87" y="126" width="36" height="8" fill="#c85520" rx="2"/>
    <circle cx="94" cy="122" r="4" fill="#e83060"/> <circle cx="102" cy="120" r="4" fill="#e83060"/>
    <circle cx="110" cy="122" r="4" fill="#e83060"/> <circle cx="118" cy="121" r="4" fill="#e83060"/>
  </g>

  <!-- ── Red family car ──────────────────────────────────────── -->
  <g transform="translate(60,255)">
    <!-- Car body -->
    <rect x="0" y="40" width="220" height="80" fill="#dd2200" rx="14"/>
    <!-- Car roof/cabin -->
    <rect x="30" y="10" width="150" height="60" fill="#cc1a00" rx="16"/>
    <!-- Windscreen -->
    <rect x="38" y="14" width="60" height="48" fill="#88ccee" rx="8" opacity="0.8"/>
    <!-- Rear window -->
    <rect x="112" y="18" width="58" height="42" fill="#88ccee" rx="8" opacity="0.8"/>
    <!-- Wheels -->
    <circle cx="55"  cy="118" r="28" fill="#333"/>
    <circle cx="55"  cy="118" r="18" fill="#666"/>
    <circle cx="55"  cy="118" r="8"  fill="#999"/>
    <circle cx="165" cy="118" r="28" fill="#333"/>
    <circle cx="165" cy="118" r="18" fill="#666"/>
    <circle cx="165" cy="118" r="8"  fill="#999"/>
    <!-- Headlight -->
    <ellipse cx="7"  cy="72" rx="10" ry="8" fill="#ffee88" rx="4"/>
    <!-- Roof rack -->
    <rect x="40" y="4" width="130" height="10" fill="#883300" rx="3"/>
    <rect x="50" y="0" width="110" height="6"  fill="#aa5500" rx="2"/>
    <!-- Steering wheel hint -->
    <circle cx="100" cy="44" r="12" fill="none" stroke="#222" stroke-width="4"/>
    <circle cx="100" cy="44" r="3"  fill="#222"/>
  </g>

  <!-- ── Slide/playground ───────────────────────────────────── -->
  <g transform="translate(570,190)">
    <!-- Frame legs -->
    <line x1="10"  y1="130" x2="50"  y2="20" stroke="#7788dd" stroke-width="8" stroke-linecap="round"/>
    <line x1="110" y1="130" x2="70"  y2="20" stroke="#7788dd" stroke-width="8" stroke-linecap="round"/>
    <line x1="10"  y1="130" x2="110" y2="130" stroke="#7788dd" stroke-width="8" stroke-linecap="round"/>
    <!-- Top platform -->
    <rect x="30" y="10" width="60" height="20" fill="#7788dd" rx="4"/>
    <!-- Slide -->
    <path d="M 90 28 Q 120 100 145 140" stroke="#dd4444" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- Steps/ladder -->
    <line x1="52" y1="22" x2="52" y2="130" stroke="#9999ee" stroke-width="6"/>
    <line x1="40" y1="55"  x2="64" y2="55"  stroke="#9999ee" stroke-width="5"/>
    <line x1="40" y1="80"  x2="64" y2="80"  stroke="#9999ee" stroke-width="5"/>
    <line x1="40" y1="105" x2="64" y2="105" stroke="#9999ee" stroke-width="5"/>
  </g>

  <!-- ── Bushes / plants ────────────────────────────────────── -->
  <!-- Left bushes -->
  <circle cx="42"  cy="348" r="22" fill="#2d8c18"/>
  <circle cx="68"  cy="342" r="26" fill="#38a820"/>
  <circle cx="94"  cy="346" r="20" fill="#2d8c18"/>
  <!-- Right bushes -->
  <circle cx="1080" cy="348" r="20" fill="#2d8c18"/>
  <circle cx="1106" cy="342" r="24" fill="#38a820"/>
  <circle cx="1130" cy="346" r="18" fill="#2d8c18"/>
  <!-- Mid-right plants -->
  <circle cx="820" cy="352" r="18" fill="#38a820"/>
  <circle cx="844" cy="346" r="22" fill="#2d8c18"/>

  <!-- ── Small flowers in grass ─────────────────────────────── -->
  <g fill="#ffd700">
    <text x="152" y="370" font-size="18">✿</text>
    <text x="620" y="365" font-size="14">✿</text>
    <text x="240" y="358" font-size="12">✿</text>
    <text x="880" y="362" font-size="16">✿</text>
  </g>
  <!-- Pink splat marks (Peppa logo style) -->
  <ellipse cx="28"  cy="220" rx="22" ry="14" fill="#f07da8" opacity="0.55" transform="rotate(-30,28,220)"/>
  <ellipse cx="18"  cy="240" rx="12" ry="8"  fill="#f07da8" opacity="0.55" transform="rotate(20,18,240)"/>

</svg>
